# speakerctl — Microsoft Modern USB-C Speaker configuration
# Edit this file to configure what each button does.
# After editing: sudo systemctl reload speakerctl

[device]
# USB identifiers — don't change unless you have a different hardware revision
vid = "045e"
pid = "083e"
# ALSA card name — shown by: cat /proc/asound/cards
alsa_card = "Speaker"

[startup]
# Volume levels (0-100%) applied on daemon start and after each reconnect.
# Comment out a line to leave that level untouched.
speaker_percent = 60
mic_percent = 85
# If set, also apply the same levels to this user's PulseAudio sink/source
# (ALSA and PulseAudio keep independent volumes — most desktop UIs show the
# PulseAudio one). Requires the sudoers rule installed by install.sh.
# pulse_user = "yourusername"

[volume_up]
command = "amixer -c Speaker set 'PCM' 5%+"

[volume_down]
command = "amixer -c Speaker set 'PCM' 5%-"

[mute]
# $STATE env var is set to "muted" or "unmuted" (post-toggle state).
# The kernel already handles the actual mute — this is for notifications.
command = "/etc/speakerctl/scripts/mute-notify.sh"

[teams]
command = "/etc/speakerctl/scripts/teams-button.sh"

[phone]
command = "/etc/speakerctl/scripts/phone-button.sh"
debounce_seconds = 0.5
